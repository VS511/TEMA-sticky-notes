<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEMA Start Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="startPage">
    <div class="container">
      <h1>TEMA</h1>

      <input
        id="canvasNameInput"
        type="text"
        placeholder="Enter canvas name"
        style="width: 100%; padding: 12px; margin-bottom: 12px; box-sizing: border-box;"
      />

      <button type="button" id="createCanvasBtn">Create New Canvas</button>
      <button type="button" id="openCanvasBtn">Open Existing Canvas</button>

      <div id="uiStatus" role="status" aria-live="polite"></div>

      <div id="canvasList" style="margin-top: 16px;"></div>
    </div>
  </div>

  <div id="canvasPage" class="hidden">
    <div class="toolbar">
      <h2>Canvas</h2>
      <button type="button" id="backBtn" style="width: auto; padding: 10px 16px;">Back</button>
      <button type="button" id="addStickyBtn" style="width: auto; padding: 10px 16px;">Add Sticky Note</button>
      <label for="groupSelect">Group</label>
      <select id="groupSelect" aria-label="Assign selected sticky to group"></select>
      <button id="applyGroupBtn" type="button" style="width: auto; padding: 10px 16px;">Apply</button>
      <input id="newGroupInput" type="text" placeholder="New group name" style="padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; min-width: 170px;" />
      <button id="newGroupBtn" type="button" style="width: auto; padding: 10px 16px;">Create/Assign</button>
      <label for="backgroundColorInput">BG</label>
      <input id="backgroundColorInput" type="color" value="#ffef88" style="width: 36px; height: 30px; border: none; cursor: pointer;" />
      <label for="borderColorInput">Border</label>
      <input id="borderColorInput" type="color" value="#d8c95f" style="width: 36px; height: 30px; border: none; cursor: pointer;" />
      <span class="toolbar-muted" id="groupHelp">Click a sticky, then choose a group.</span>
    </div>
    <div id="canvasArea"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
